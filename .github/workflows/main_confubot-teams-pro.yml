# ⚠️ Workflow modificado a mano. La plantilla original generada por Azure
# (Deployment Center → GitHub) tenía 3 bugs que rompían el deploy:
#   - actions/upload-artifact@v4 subía un folder en vez de un .zip
#   - azure/webapps-deploy@v3 sin `package:` caía en OneDeploy y saltaba Oryx
#     → no se ejecutaba `pip install` en el servidor
#   - venv local creado pero nunca usado (los venvs de Python no son
#     relocatables: shebangs apuntan a /home/runner/...)
#
# Síntomas del bug original:
#   WARNING: Could not find virtual environment directory /home/site/wwwroot/antenv
#   /opt/startup/startup.sh: 23: hypercorn: not found
#
# Si alguien desconecta y reconecta el Deployment Center, Azure regenerará
# esta plantilla y volverá a romperla. Re-aplicar este fix tras cada reconexión.

name: Build and deploy Python app to Azure Web App - confubot-teams-pro

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Validación temprana: si requirements.txt no instala, fallamos aquí
      # en vez de en Azure tras 5 minutos de despliegue.
      - name: Validate requirements installable
        run: |
          python -m venv /tmp/probe
          /tmp/probe/bin/pip install --upgrade pip
          /tmp/probe/bin/pip install -r requirements.txt
          rm -rf /tmp/probe

      # Empaquetado explícito como .zip → fuerza zipdeploy en webapps-deploy@v3
      # → respeta SCM_DO_BUILD_DURING_DEPLOYMENT=1 → Oryx instala deps en Azure.
      - name: Package app as zip
        run: |
          zip -r release.zip . \
            -x ".git/*" ".github/*" ".venv/*" "antenv/*" "venv/*" \
               "__pycache__/*" "*.pyc" ".env" ".claude/*"

      - uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'confubot-teams-pro'
          slot-name: 'Production'
          package: release.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_55B63DD96D6946B69E09CA30A9140768 }}
